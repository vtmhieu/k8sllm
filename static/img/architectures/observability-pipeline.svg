  <text class="muted" x="856" y="286" font-size="16">Prometheus or Mimir</text>
  <text class="muted" x="856" y="322" font-size="16">Loki</text>
  <text class="muted" x="856" y="358" font-size="16">Tempo or Jaeger</text>
