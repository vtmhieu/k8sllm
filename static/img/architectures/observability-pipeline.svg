  <text class="muted" x="96" y="348" font-size="16">Ingress</text>
  <text class="muted" x="96" y="384" font-size="16">Nodes</text>
  <text class="muted" x="96" y="420" font-size="16">Kubernetes events</text>

  <rect class="green" x="424" y="128" width="290" height="168"/>
